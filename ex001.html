<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo DOM</title>
    <style>
        body{
            background-color: gray;
        }

        div{
            background-color: cadetblue;
            width: 100px;
            height: 100px;
            padding: 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>testando eventos</h1>
    <hr>
    <div id="area">
        <p>interaja....</p>
    </div>
    <script>
        const evento = window.document.getElementById('area')
        evento.addEventListener('click', clicar)
        evento.addEventListener('mouseenter', entrar)
        evento.addEventListener('mouseleave', sair)

        function sair(){
            evento.innerText = "saiu"
            evento.style.backgroundColor = "green"
        }

        function entrar(){
            evento.innerText = "entrou"
            evento.style.backgroundColor = "red"
        }

        function clicar(){
            evento.innerText = "clicou"
            evento.style.backgroundColor = "blue"
        }
    </script>
</body>
</html>
