<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicios query selector</title>
    <style>
        body{
            background-color: gray;
        }
    </style>
</head>
<body>
    <h1>exercicios</h1>
    <hr>
    <h2>ex01</h2>
    <div id="container">
        <p>este e um container</p>
    </div>
    <p class="texto">Lorem ipsum dolor sit amet consectetur, adipisicing elit</p>
    <p class="texto">Lorem ipsum dolor sit amet consectetur, adipisicing elit</p>
    <p class="texto">Lorem ipsum dolor sit amet consectetur, adipisicing elit</p>
    <button type="button">
        botao
    </button>

    <script>
        const seletordiv = window.document.querySelector("#container")
        const seletorPrimeiroTexto = window.document.querySelector(".texto")
        const seletortexto = window.document.querySelectorAll(".texto")
    </script>
    <hr>

    <h2>ex02</h2>

    <div id="mensagen">
        <p>texto teste</p>
    </div>
    <button class="atualizar" type="button">Atualizar</button>
    <script>
        const seletorDiv = window.document.querySelector("#mensagen p")
        const seletorBotao = window.document.querySelector(".atualizar")

        seletorBotao.addEventListener("click", clicar)
        function clicar(){
            seletorDiv.innerText = "texto atualizado"
            seletorDiv.style.color = "blue"
            seletorDiv.style.fontSize = "18px"
        }

    </script>
    <hr>
    <h2>ex03</h2>
    <ul class="lista">
        <li>pera</li>
        <li>uva</li>
        <li>chromebook</li>
        <li>tvbox</li>
    </ul>

    <script>
        const seletorUl = window.document.querySelectorAll(".lista li")

        const valorPrimeiro = seletorUl[0].textContent
        const valorUltimo = seletorUl[seletorUl.length - 1].textContent
        const indicePar = seletorUl[2].textContent
        const indiceImpar = seletorUl[1].textContent

        window.alert(`os valores são: ${valorPrimeiro}, ult ${valorUltimo}, par ${indicePar}, imp ${indiceImpar}`)
    </script>

</body>
</html>
