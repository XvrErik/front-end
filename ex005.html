<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicios query selector</title>
    <style>
        body{
            background-color: gray;
        }
    </style>
</head>
<body>
    <h1>exercicios</h1>
    <hr>
    <h2>ex01</h2>
    <div id="container">
        <p>este e um container</p>
    </div>
    <p class="texto">Lorem ipsum dolor sit amet consectetur, adipisicing elit</p>
    <p class="texto">Lorem ipsum dolor sit amet consectetur, adipisicing elit</p>
    <p class="texto">Lorem ipsum dolor sit amet consectetur, adipisicing elit</p>
    <button type="button">
        botao
    </button>

    <script>
        const seletordiv = window.document.querySelector("#container")
        const seletorPrimeiroTexto = window.document.querySelector(".texto")
        const seletortexto = window.document.querySelectorAll(".texto")
    </script>
    <hr>

    <h2>ex02</h2>

    <div id="mensagen">
        <p>texto teste</p>
    </div>
    <button class="atualizar" type="button"></button>
    <script>
        const seletorDiv = window.document.querySelector("#mensagen/p")
        const seletorBotao = window.document.querySelector(".atualizar")

        seletorBotao.addEventListener("click", clicar)
        function clicar(){
            seletorDiv.innerText = "texto atualizado"
            seletorDiv.style.backgroundColor = "blue"
            seletorDiv.style.fontSize = "18px"
        }

    </script>
</body>
</html>
