<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio loop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button type="button" id="botao">
        clique
    </button>
    <ul id="lista">

    </ul>
    <script>
        const btn = document.querySelector("button#botao")
        const lista = document.querySelector("ul#lista")

        btn.addEventListener("click", clicar)

        function clicar() {
            for (let con = 1; con <= 10; con += 1) {
                let valor = document.createElement("li")
                valor.textContent = `${con}`
                lista.appendChild(valor)
            }
        }
    </script>
</body>
</html>
