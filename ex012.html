<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio aula</title>
    <link rel="stylesheet" href="style001.css">
</head>
<body>
    <h1>contador</h1>
    <div id="caixa" class="div">
        inicio:<input type="number" name="inicio" id="inicio">
        final:<input type="number" name="fim" id="fim">
        passo:<input type="number" name="passo" id="passo">
        <button type="button" id="botao" class="button">
            veja
        </button>
        <p></p>
    </div>
    
    <script>
        const texto = window.document.querySelector("p")
        const inicio = window.document.querySelector("input#inicio")
        const final = window.document.querySelector("input#fim")
        const passo = window.document.querySelector("input#passo")
        const btn = window.document.querySelector("button#botao")
        
        btn.addEventListener("click", clicar)

        function clicar(){
            const valorInicio = Number(inicio.value)
            const valorFinal = Number(final.value)
            const valorPasso = Number(passo.value)
            if (valorFinal <= 0){
                texto.innerHTML = "nao e possivel contar"
            }else if(valorPasso <=0){
                alert("nao da para contar no passo 0")
                valorPasso += 1
            }
            texto.innerHTML = ''
            for (let con = valorInicio; con <= valorFinal; con += valorPasso){
                texto.innerHTML += `&#128073; ${con} `
            }

        }
    </script>
</body>
</html>
