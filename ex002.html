<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eventos</title>
    <style>
        body{
            background-color: gray;
        }
        button{
            text-align: center;
            background-color: blue;
            width: 100px;
            height: 10px;
            color: white;
            border-radius: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>testando mais eventos</h1>
    <hr>
    <p>o texto abaixo sera alterado</p>
    <p>texto para ser alterado</p>
    <button id="btn" type="button">
        clicar
    </button>
    <script>
        const texto = document.getElementsByTagName('p')[1]
        const botao = document.getElementById('btn')

        botao.addEventListener('click', clicar)

        function clicar() {
            texto.innerText = "o texto foi alterado"
            alert("botao clicado!")
        }
    </script>
</body>
</html>
