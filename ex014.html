<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>analisando numeros</title>
    <link rel="stylesheet" href="style001.css">
</head>
<body>
    <h1>analizador de numeros</h1>
    <div id="caixa">
        numero (entre 1 e 100):<input type="number" name="numero" id="numero">
        <button type="button" class="botao" id="botaoadicionar">
            adicionar
        </button>
        <select name="saida" id="saida">

        </select>
        <button type="button" class="botao" id="finalizar">
            finalizar
        </button>
        <p id="texto1"></p>
        <p id="texto2"></p>
        <p id="texto3"></p>
        <p id="texto4"></p>
        <p id="texto5"></p>
        <p id="texto6"></p>        
    </div>
    <script>
        const texto1 = window.document.querySelector("p#texto1")
        const texto2 = window.document.querySelector("p#texto2")
        const texto3 = window.document.querySelector("p#texto3")
        const texto4 = window.document.querySelector("p#texto4")
        const texto5 = window.document.querySelector("p#texto5")
        const texto6 = window.document.querySelector("p#texto6")        
        const valor = window.document.querySelector("input#numero")
        const saida = window.document.querySelector("select#saida")
        const btnAdicionar = window.document.querySelector("button#botaoadicionar")
        const btnFinalizar = window.document.querySelector("button#finalizar")

        let numeros = []

        btnAdicionar.addEventListener("click", adicionar)
        btnFinalizar.addEventListener("click", finalizar)
        function adicionar(){
            const uservalue = Number(valor.value)
            switch (true) {
                case uservalue > 100:
                    alert(`o valor ${uservalue} e maior tente outro valor`)
                    break;

                case uservalue < 1:
                    alert(`o valor ${uservalue} nao e valido pois ele e menor que 1`)
                    break;

                case numeros.includes(uservalue):
                    alert("o valor digitado ja existe")
                    break;
 
                default:
                    const mostrar = document.createElement("option")
                    mostrar.value = `numero: ${uservalue}`
                    mostrar.text = `numero: ${uservalue}`
                    saida.appendChild(mostrar)
                    numeros.push(uservalue)
                    break;
            }
        }
        function finalizar(){
            let soma = 0
            for (let i = 0; i < numeros.length; i++) {
                soma += numeros[i]
            }
            const media = soma / numeros.length;
            //calcular a media dos valores
            texto1.innerHTML = `ao todo <strong>temos ${numeros.length}</strong> cadastrados`
            texto2.innerHTML = `o maior numero <strong>e ${Math.max(...numeros)}</strong>`
            texto3.innerHTML = `o menor numero <strong>foi ${Math.min(...numeros)}</strong>`
            texto4.innerHTML = `a soma de todos os valores <strong>e ${soma}</strong>`
            texto5.innerHTML = `e a media dos valores <strong>e ${media}</strong>`
            texto6.innerHTML = "obrigado por utilizar"
        }
    </script>
</body>
</html>
