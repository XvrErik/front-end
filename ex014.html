<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>analisando numeros</title>
    <link rel="stylesheet" href="style001.css">
</head>
<body>
    <h1>analizador de numeros</h1>
    <div id="caixa">
        numero (entre 1 e 100):<input type="number" name="numero" id="numero">
        <button type="button" class="botaoadicionar" id="botao">
            adicionar
        </button>
        <select name="saida" id="saida">

        </select>
        <button type="button" class="finalizar" id="botao">
            finalizar
        </button>
        <p></p>
    </div>
    <script>
        const texto = window.document.querySelector("p")
        const valor = window.document.querySelector("input#numero")
        const saida = window.document.querySelector("select#saida")
        const btnAdicionar = window.document.querySelector("button.botaoadicionar")
        const btnFinalizar = window.document.querySelector("button.finalizar")

        btnAdicionar.addEventListener("click", adicionar)
        function adicionar(){
            const uservalue = Number(valor.value)
            switch (true) {
                case uservalue > 100:
                    alert(`o valor ${uservalue} e maior tente outro valor`)
                    break;

                case uservalue < 1:
                    alert(`o valor ${uservalue} nao e valido pois ele e menor que 1`)
                    break

                case uservalue == null:
                    alert("a caixa nao pode estar vazia")
                    break
            
                default:
                    let usernumeros = []
                    usernumeros.push = uservalue
                    
                    const mostrar = document.createElement("option")
                    mostrar.value = `${usernumeros}`
                    mostrar.text = `${usernumeros}`
                    saida.appendChild(mostrar)
                    break;
            }
        }
    </script>
</body>
</html>
