<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>condicoes</title>
    <style>
        body{
            background-color: gray;
        }
        input{
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 40px;
            width: 300px;
            border-radius: 5px;
            color: black;
        }
        button{
            width: 100px;
            height: 40px;
            background-color: blue;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>verificar idade</h1>
    <hr>
    <input type="number" name="idade" id="idade">
    <button type="button" id="verificar">
        verificar
    </button>
    <script>
        const idade = window.document.querySelector("#idade")
        const btn = window.document.querySelector("#verificar")
        btn.addEventListener("click", clicar)

        function clicar(){
            const valorInt = Number(idade.value)

            if (valorInt < 18){
                window.alert(`desculpe, mas a sua idade é ${valorInt} e a idade mínima é 18`)
            } else {
                window.alert('olá, seja bem vindo')
            }
        }
    </script>
    <hr>
    <h2>ex002</h2>
    <h3>par impar</h3>
    <input type="number" name="num" id="num">
    <button type="button" id="verificacao">
        verificar
    </button>

    <script>
        const numero = window.document.querySelector("#num")
        const botao = window.document.querySelector("#verificacao")

        botao.addEventListener("click", clique)

        function clique(){
            const valInt = Number(numero.value)

            if (valInt %2 == 0){
                window.alert(`o valor ${valInt} e par`)
            }else{
                window.alert(`o valor ${valInt} e impar`)
            }
        }
    </script>
    <hr>
    <h2>ex003</h2>
    <h3>comparar dois numeros</h3>
    <input type="number" name="num1" id="num1">
    <input type="number" name="num2" id="num2">
    <button type="button"id="botao03">
        verificar
    </button>
    <script>
        const numero1 = window.document.querySelector("#num1")
        const numero2 = window.document.querySelector("#num2")
        const botao3 = window.document.querySelector("#botao03")
        
        botao3.addEventListener("click", click3)

        function click3(){
            const val1 = Number(numero1.value)
            const val2 = Number(numero2.value)
            if(val1 > val2){
                window.alert(`o valor ${val1} e maior que ${val2}`)
            }else if (val1 == val2) {
                window.alert(`o valor ${val1} e igual ao valor ${val2}`)
            } else {
                window.alert(`o valor ${val1} e menos que ${val2}`)
            }
        }
    </script>
    <hr>
    <h2>ex04</h2>
    <h3>medias</h3>
    <input type="number" name="nota1" id="nota1"> nota 1
    <input type="number" name="nota2" id="nota2"> nota 2
    <input type="number" name="nota3" id="nota3"> nota 3
    <input type="number" name="nota4" id="nota4"> nota 4

    <button type="button" id="botao4">
        verifique
    </button>
    <script>
        const notas1 = window.document.querySelector("#nota1")
        const notas2 = window.document.querySelector("#nota2")
        const notas3 = window.document.querySelector("#nota3")
        const notas4 = window.document.querySelector("#nota4")
        const btn4 = window.document.querySelector("#botao4")

        btn4.addEventListener("click", click4)

        function click4(){
            const val01 = Number(notas1.value)
            const val02 = Number(notas1.value)
            const val03 = Number(notas1.value)
            const val04 = Number(notas1.value)
            
            r = val01 + val02 + val03 + val04 /2

            if (r >= 24){
                window.alert("aluno aprovado!")
            }else{
                window.alert("aluno reprovado!")
            }
        }
    </script>
</body>
</html>
